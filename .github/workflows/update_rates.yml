name: Auto Update Exchange Rates

on:
  schedule:
    # 第一次：泰国时间 00:15 (UTC 16:15)
    - cron: '15 16 * * *'
    # 第二次：泰国时间 10:15 (UTC 2:15)
    - cron: '15 2 * * *'
  workflow_dispatch: # 手动触发按钮

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install requests

      - name: 运行更新脚本
        run: python update_rates.py

      - name: 提交并推送更改
        run: |
          git config --local user.email "41898282+github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          
          git add rates.json history.json
          git commit -m "chore: auto sync exchange rates $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push

