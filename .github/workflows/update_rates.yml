name: Auto Sync History

on:
  push:
    paths:
      - 'rates.json'    # 核心：手机上一改这个文件，立马触发同步
  schedule:
    # 保持你原有的两个定时点，作为自动打卡备份
    - cron: '15 16 * * *' # 泰国 00:15
    - cron: '15 2 * * *'  # 泰国 10:15
  workflow_dispatch:      # 网页上手动触发按钮

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 运行同步脚本
        run: python update_rates.py

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 只有 history.json 会被程序改变，rates.json 是你手动改的
          git add history.json
          git commit -m "chore: sync history data $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push

